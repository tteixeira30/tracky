services:
  db:
    image: postgres:16-alpine
    container_name: tracky-db
    environment:
      POSTGRES_DB: tracky
      POSTGRES_USER: tracky
      POSTGRES_PASSWORD: ${DB_PASSWORD:?define DB_PASSWORD no ficheiro .env}
    volumes:
      - tracky-dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracky -d tracky"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: tracky-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tracky
      SPRING_DATASOURCE_USERNAME: tracky
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?define DB_PASSWORD no ficheiro .env}
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET no ficheiro .env}
      TRACKY_INVITE_CODE: ${INVITE_CODE:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tracky-frontend
    depends_on:
      - backend
    restart: unless-stopped

  # Cloudflare Tunnel: liga-se à Cloudflare por outbound — nenhuma porta da VM
  # fica exposta à internet (fecha 80/443 na firewall; sobra só o SSH).
  # O TLS é terminado na edge da Cloudflare; o hostname público do túnel
  # aponta para http://frontend:8080 (o nginx já faz proxy de /api ao backend).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tracky-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?define CLOUDFLARE_TUNNEL_TOKEN no ficheiro .env}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  tracky-dbdata:
