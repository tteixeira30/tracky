# Pipeline principal: corre em cada PR para main e em cada push a main.
# Jobs paralelos: backend (unit + integração), frontend (lint + testes + build),
# trivy (vulnerabilidades). O e2e só corre depois de backend+frontend passarem.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (unit + integração)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Testes (Testcontainers usa o Docker do runner)
        run: |
          chmod +x mvnw
          ./mvnw -B verify

  frontend:
    name: Frontend (lint + testes + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build

  e2e:
    name: E2E (Playwright contra a stack Docker)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Arrancar a stack (valida também os Dockerfiles)
        run: docker compose up -d --build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
        working-directory: e2e

      - name: Cache dos browsers Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Esperar pela stack (nginx → backend → db)
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/login \
              -H 'Content-Type: application/json' -d '{}') || code=000
            # qualquer resposta 4xx prova que frontend, proxy, backend e BD estão de pé
            if [ "$code" -ge 400 ] && [ "$code" -lt 500 ]; then exit 0; fi
            sleep 2
          done
          echo "A stack não ficou pronta a tempo" && docker compose logs && exit 1

      - name: Testes E2E
        run: npx playwright test
        working-directory: e2e

      - name: Logs da stack (em falha)
        if: failure()
        run: docker compose logs

      - name: Relatório Playwright (em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  trivy:
    name: Vulnerabilidades (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan de dependências (pom.xml + package-lock.json)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan de configuração (Dockerfiles + compose)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
