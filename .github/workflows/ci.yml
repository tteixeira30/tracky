# Pipeline principal: corre em cada PR para main e em cada push a main.
# Jobs paralelos: backend (unit + integração), frontend (lint + testes + build),
# trivy (vulnerabilidades). O e2e só corre depois de backend+frontend passarem.
# No fim, o job "resumo" publica/atualiza um comentário no PR com os resultados.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (unit + integração)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    outputs:
      resumo: ${{ steps.resumo.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Testes (Testcontainers usa o Docker do runner)
        run: |
          set -o pipefail
          chmod +x mvnw
          ./mvnw -B verify 2>&1 | tee mvn.log
      - name: Resumo dos testes
        id: resumo
        if: always()
        run: |
          line=$(grep -E 'Tests run:.*Failures' mvn.log 2>/dev/null | tail -1 | sed 's/^\[INFO\] *//')
          echo "summary=${line:-sem resultados — a build falhou antes dos testes}" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend (lint + testes + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    outputs:
      resumo: ${{ steps.resumo.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Testes
        run: |
          set -o pipefail
          npm run test:run 2>&1 | tee vitest.log
      - run: npm run build
      - name: Resumo dos testes
        id: resumo
        if: always()
        run: |
          line=$(sed 's/\x1b\[[0-9;]*m//g' vitest.log 2>/dev/null | grep -E '^[[:space:]]*(Test Files|Tests) ' | xargs)
          echo "summary=${line:-sem resultados — o lint ou o npm ci falharam antes dos testes}" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E (Playwright contra a stack Docker)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    outputs:
      resumo: ${{ steps.resumo.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - name: Arrancar a stack (valida também os Dockerfiles)
        run: docker compose up -d --build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
        working-directory: e2e

      - name: Cache dos browsers Playwright
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Esperar pela stack (nginx → backend → db)
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/api/auth/login \
              -H 'Content-Type: application/json' -d '{}') || code=000
            # qualquer resposta 4xx prova que frontend, proxy, backend e BD estão de pé
            if [ "$code" -ge 400 ] && [ "$code" -lt 500 ]; then exit 0; fi
            sleep 2
          done
          echo "A stack não ficou pronta a tempo" && docker compose logs && exit 1

      - name: Testes E2E
        working-directory: e2e
        run: |
          set -o pipefail
          npx playwright test 2>&1 | tee pw.log

      - name: Resumo dos testes
        id: resumo
        if: always()
        working-directory: e2e
        run: |
          line=$(sed 's/\x1b\[[0-9;]*m//g' pw.log 2>/dev/null | grep -E '^[[:space:]]*[0-9]+ (passed|failed|flaky|skipped)' | xargs)
          echo "summary=${line:-sem resultados — a stack não arrancou ou os testes não correram}" >> "$GITHUB_OUTPUT"

      - name: Logs da stack (em falha)
        if: failure()
        run: docker compose logs

      - name: Relatório Playwright (em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  trivy:
    name: Vulnerabilidades (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan de dependências (pom.xml + package-lock.json)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan de configuração (Dockerfiles + compose)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

  resumo:
    name: Comentário de resumo no PR
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [backend, frontend, e2e, trivy]
    permissions:
      pull-requests: write
    env:
      BACKEND_RESULT: ${{ needs.backend.result }}
      BACKEND_TESTES: ${{ needs.backend.outputs.resumo }}
      FRONTEND_RESULT: ${{ needs.frontend.result }}
      FRONTEND_TESTES: ${{ needs.frontend.outputs.resumo }}
      E2E_RESULT: ${{ needs.e2e.result }}
      E2E_TESTES: ${{ needs.e2e.outputs.resumo }}
      TRIVY_RESULT: ${{ needs.trivy.result }}
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- tracky-ci-summary -->'
            const icons = { success: '✅', failure: '❌', cancelled: '🚫', skipped: '⏭️' }
            const rotulos = { success: 'passou', failure: 'falhou', cancelled: 'cancelado', skipped: 'não correu' }
            const row = (nome, res, detalhe) =>
              `| ${nome} | ${icons[res] || '❔'} ${rotulos[res] || res} | ${detalhe || '—'} |`

            const falhou = [process.env.BACKEND_RESULT, process.env.FRONTEND_RESULT,
                            process.env.E2E_RESULT, process.env.TRIVY_RESULT]
              .some((r) => r === 'failure' || r === 'cancelled')

            const body = [
              marker,
              `## ${falhou ? '❌' : '✅'} Resumo da pipeline`,
              '',
              '| Job | Resultado | Testes |',
              '|---|---|---|',
              row('Backend (unit + integração)', process.env.BACKEND_RESULT, process.env.BACKEND_TESTES),
              row('Frontend (lint + testes + build)', process.env.FRONTEND_RESULT, process.env.FRONTEND_TESTES),
              row('E2E (Playwright, stack Docker completa)', process.env.E2E_RESULT, process.env.E2E_TESTES),
              row('Vulnerabilidades (Trivy)', process.env.TRIVY_RESULT, 'dependências + config (gate CRITICAL/HIGH)'),
              '',
              `Commit: ${context.payload.pull_request.head.sha.slice(0, 7)} · ` +
                `[Ver execução completa](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const existente = comments.find((c) => c.body && c.body.includes(marker))
            if (existente) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existente.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
