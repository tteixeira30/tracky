server {
    listen 8080;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve .mjs como JavaScript. Versões antigas do nginx não mapeiam .mjs no
    # mime.types e serviam-no como application/octet-stream — o browser recusa
    # então o web worker (módulo) do pdf.js e o import de extratos PDF rebenta
    # com "Erro ao ler". default_type só se aplica quando a extensão não tem
    # mapeamento, pelo que é inofensivo em nginx recentes (que já mapeiam .mjs).
    location ~ \.mjs$ {
        default_type text/javascript;
    }

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
